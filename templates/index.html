<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFS File Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📁 NFS File Manager</h1>
            <p>Gerenciador de arquivos centralizado com NFS</p>
        </div>

        <!-- Upload Section -->
        <div class="upload-section">
            <div id="uploadArea" class="upload-area">
                <div class="upload-icon">📤</div>
                <h2>Arrastar arquivos aqui</h2>
                <p>ou clique para selecionar</p>
            </div>
            <input type="file" id="fileInput" multiple hidden>
            
            <!-- Upload Progress -->
            <div id="uploadProgress" class="progress-container" style="display: none;">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <p id="progressText">Preparando upload...</p>
            </div>

            <!-- Upload Status Messages -->
            <div id="uploadStatus" class="upload-status"></div>
        </div>

        <!-- Files Stats -->
        <div id="filesStats" class="files-stats" style="display: none;">
            <div class="stat-item">
                <span class="stat-label">Arquivos:</span>
                <span class="stat-value" id="totalFiles">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Tamanho Total:</span>
                <span class="stat-value" id="totalSize">0 B</span>
            </div>
            <button id="refreshBtn" class="btn btn-primary">🔄 Atualizar</button>
        </div>

        <!-- Files List Section -->
        <div class="files-section">
            <h2>Arquivos</h2>
            <div id="loadingIndicator" class="loading">
                <div class="spinner"></div>
                <p>Carregando arquivos...</p>
            </div>
            <div id="noFiles" class="no-files" style="display: none;">
                <p>📭 Nenhum arquivo enviado ainda</p>
            </div>
            <div id="filesList" class="files-list"></div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
